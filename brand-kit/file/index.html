<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>BainUltra - File Viewer</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bu-accent: #c8a87c;
        --bu-accent-light: #d4bc98;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html {
        height: 100%;
        font-family: "Inter", -apple-system, sans-serif;
        background: #000;
      }
      body {
        height: 100vh;
        background: #000;
        color: #fff;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
        height: 52px;
        flex-shrink: 0;
        background: #111;
        border-bottom: 1px solid rgba(255,255,255,0.07);
        gap: 12px;
      }
      .back-btn {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        font-weight: 500;
        color: rgba(255,255,255,0.5);
        text-decoration: none;
        flex-shrink: 0;
        transition: color 0.2s;
      }
      .back-btn:hover { color: #fff; }
      .back-btn svg { width: 16px; height: 16px; fill: currentColor; }
      .file-title {
        font-size: 13px;
        font-weight: 500;
        color: rgba(255,255,255,0.8);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        text-align: center;
        flex: 1;
      }
      .dl-btn {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        font-weight: 600;
        color: #fff;
        padding: 7px 16px;
        border-radius: 7px;
        background: var(--bu-accent);
        text-decoration: none;
        flex-shrink: 0;
        transition: background 0.2s;
        white-space: nowrap;
      }
      .dl-btn:hover { background: var(--bu-accent-light); }
      .dl-btn svg { width: 13px; height: 13px; fill: currentColor; }
      .viewer {
        flex: 1;
        overflow: hidden;
        position: relative;
        background: #1a1a1a;
      }
      .viewer iframe {
        width: 100%;
        height: 100%;
        border: none;
        display: block;
      }
      .viewer img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }
      .viewer video {
        width: 100%;
        height: 100%;
        display: block;
        background: #000;
      }
      .download-only {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        gap: 20px;
        padding: 40px;
      }
      .download-only .file-icon { color: var(--bu-accent); opacity: 0.5; }
      .download-only .file-icon svg { width: 72px; height: 72px; fill: currentColor; }
      .download-only .file-msg {
        font-size: 15px;
        color: rgba(255,255,255,0.5);
        text-align: center;
      }
      .download-only .dl-big {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
        font-weight: 600;
        color: #fff;
        padding: 12px 32px;
        border-radius: 8px;
        background: var(--bu-accent);
        text-decoration: none;
        transition: background 0.2s;
      }
      .download-only .dl-big:hover { background: var(--bu-accent-light); }
      .download-only .dl-big svg { width: 15px; height: 15px; fill: currentColor; }
      #icon-templates { display: none; }
    </style>
  </head>
  <body>
    <!-- SVG templates — cloned by JS, never receive user data via innerHTML -->
    <div id="icon-templates">
      <svg id="tpl-back" viewBox="0 0 24 24">
        <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
      </svg>
      <svg id="tpl-dl" viewBox="0 0 24 24">
        <path d="M12 16l-5-5h3V4h4v7h3l-5 5zm-7 4h14v-2H5v2z"/>
      </svg>
      <svg id="tpl-file" viewBox="0 0 24 24">
        <path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/>
      </svg>
    </div>

    <div class="topbar">
      <a class="back-btn" id="back-btn" href="../">
        <span id="back-icon-slot"></span>
        Back
      </a>
      <div class="file-title" id="file-title">Loading&hellip;</div>
      <a class="dl-btn" id="dl-btn" href="#" target="_blank" rel="noopener">
        <span id="dl-icon-slot"></span>
        Download
      </a>
    </div>

    <div class="viewer" id="viewer"></div>

    <script>
      // Clone SVG icon from template
      function icon(tplId) {
        return document.getElementById(tplId).cloneNode(true);
      }
      document.getElementById('back-icon-slot').appendChild(icon('tpl-back'));
      document.getElementById('dl-icon-slot').appendChild(icon('tpl-dl'));

      var p = new URLSearchParams(window.location.search);
      var fileId    = p.get('fileId') || '';
      var fileName  = p.get('name') || 'File';
      var parentId  = p.get('parentId');
      var parentName = p.get('parentName') || 'Brand Kit';

      document.getElementById('file-title').textContent = fileName;
      document.title = 'BainUltra \u2014 ' + fileName;

      // Back button
      if (parentId) {
        document.getElementById('back-btn').href =
          '../view/?folderId=' + encodeURIComponent(parentId)
          + '&name=' + encodeURIComponent(parentName);
      }

      // Drive URLs
      var dlUrl      = 'https://drive.google.com/uc?export=download&id=' + fileId;
      var previewUrl = 'https://drive.google.com/file/d/' + fileId + '/preview';
      var viewUrl    = 'https://drive.google.com/uc?export=view&id=' + fileId;

      // Download button
      var dlBtn = document.getElementById('dl-btn');
      dlBtn.href = dlUrl;

      // Determine file type from extension (no API call needed)
      var ext = fileName.split('.').pop().toLowerCase();
      var viewer = document.getElementById('viewer');

      var IMAGE_EXTS = { jpg: 1, jpeg: 1, png: 1, gif: 1, webp: 1, svg: 1, avif: 1 };
      var VIDEO_EXTS = { mp4: 1, mov: 1, webm: 1, avi: 1, mkv: 1, m4v: 1 };

      if (!fileId) {
        // No file ID
        var msg = document.createElement('div');
        msg.className = 'download-only';
        var msgText = document.createElement('div');
        msgText.className = 'file-msg';
        msgText.textContent = 'No file specified.';
        msg.appendChild(msgText);
        viewer.appendChild(msg);

      } else if (ext === 'pdf') {
        // PDF — embed via Drive preview iframe
        var iframe = document.createElement('iframe');
        iframe.src = previewUrl;
        iframe.allowFullscreen = true;
        viewer.appendChild(iframe);

      } else if (IMAGE_EXTS[ext]) {
        // Image — display directly
        var img = document.createElement('img');
        img.src = viewUrl;
        img.alt = fileName;
        viewer.appendChild(img);

      } else if (VIDEO_EXTS[ext]) {
        // Video — try direct src first, fall back to iframe embed
        var video = document.createElement('video');
        video.src = viewUrl;
        video.controls = true;
        video.autoplay = true;
        video.style.cssText = 'width:100%;height:100%;background:#000;';
        video.addEventListener('error', function () {
          viewer.textContent = '';
          var iframe = document.createElement('iframe');
          iframe.src = previewUrl;
          iframe.allowFullscreen = true;
          iframe.style.cssText = 'width:100%;height:100%;border:none;';
          viewer.appendChild(iframe);
        });
        viewer.appendChild(video);

      } else {
        // Not previewable — show download screen
        var wrap = document.createElement('div');
        wrap.className = 'download-only';

        var iconWrap = document.createElement('div');
        iconWrap.className = 'file-icon';
        iconWrap.appendChild(icon('tpl-file'));

        var msg = document.createElement('div');
        msg.className = 'file-msg';
        msg.textContent = 'This file type cannot be previewed in the browser.';

        var label = ext ? ext.toUpperCase() + ' file' : 'File';
        var dlBig = document.createElement('a');
        dlBig.className = 'dl-big';
        dlBig.href = dlUrl;
        dlBig.target = '_blank';
        dlBig.rel = 'noopener';
        dlBig.appendChild(icon('tpl-dl'));
        dlBig.appendChild(document.createTextNode(' Download ' + label));

        wrap.appendChild(iconWrap);
        wrap.appendChild(msg);
        wrap.appendChild(dlBig);
        viewer.appendChild(wrap);
      }
    </script>
  </body>
</html>
