<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>BainUltra - Brand Kit</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bu-accent: #c8a87c;
        --bu-accent-light: #d4bc98;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html {
        height: 100%;
        font-family: "Inter", -apple-system, sans-serif;
        background: #000;
      }
      body {
        min-height: 100vh;
        background: #0a0a0a;
        color: #fff;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-bottom: env(safe-area-inset-bottom, 0);
      }
      .header {
        padding: 40px 24px 16px;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
      }
      .logo-mark { width: 180px; max-width: 50vw; margin-bottom: 8px; }
      .logo-mark svg { width: 100%; height: auto; }
      .tagline {
        font-size: 11px;
        font-weight: 300;
        color: rgba(255,255,255,0.35);
        letter-spacing: 0.15em;
        text-transform: uppercase;
      }
      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        font-weight: 500;
        color: rgba(255,255,255,0.35);
        text-decoration: none;
        letter-spacing: 0.05em;
        margin-top: 14px;
        transition: color 0.2s;
      }
      .back-link:hover { color: rgba(255,255,255,0.65); }
      .back-link svg { width: 14px; height: 14px; fill: currentColor; }
      .divider {
        width: 60px;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--bu-accent), transparent);
        margin: 20px auto 16px;
      }
      .folder-heading {
        text-align: center;
        padding: 0 20px 24px;
        width: 100%;
        max-width: 1100px;
      }
      .folder-heading h1 {
        font-size: 20px;
        font-weight: 600;
        letter-spacing: -0.02em;
      }
      .file-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 16px;
        width: 100%;
        max-width: 1200px;
        padding: 0 20px 60px;
      }
      .file-card {
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 12px;
        overflow: hidden;
        transition: all 0.2s;
        cursor: pointer;
        text-decoration: none;
        color: #fff;
        display: flex;
        flex-direction: column;
      }
      .file-card:hover {
        background: rgba(255,255,255,0.07);
        border-color: rgba(200,168,124,0.25);
        transform: translateY(-2px);
      }
      .file-thumb {
        width: 100%;
        aspect-ratio: 4/3;
        background: rgba(255,255,255,0.03);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
      }
      .file-thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .folder-arrow-badge {
        position: absolute;
        bottom: 10px;
        right: 10px;
        width: 26px;
        height: 26px;
        background: rgba(200,168,124,0.15);
        border: 1px solid rgba(200,168,124,0.3);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--bu-accent);
        z-index: 1;
      }
      .folder-arrow-badge svg { width: 13px; height: 13px; fill: currentColor; }
      .ext-badge {
        position: absolute;
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.55);
        border: 1px solid rgba(255,255,255,0.12);
        color: rgba(255,255,255,0.55);
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 3px 8px;
        border-radius: 4px;
      }
      .folder-icon-bg {
        width: 48px;
        height: 48px;
        background: rgba(200,168,124,0.08);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--bu-accent);
      }
      .folder-icon-bg svg { width: 24px; height: 24px; fill: currentColor; }
      .file-info {
        padding: 10px 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .file-name {
        flex: 1;
        font-size: 12px;
        font-weight: 500;
        line-height: 1.3;
        word-break: break-word;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .file-action {
        flex-shrink: 0;
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 11px;
        font-weight: 500;
        color: var(--bu-accent);
        padding: 4px 10px;
        border-radius: 5px;
        background: rgba(200,168,124,0.1);
        border: 1px solid rgba(200,168,124,0.15);
      }
      .file-action svg { width: 11px; height: 11px; fill: currentColor; }
      .status-msg {
        text-align: center;
        padding: 80px 20px;
        font-size: 14px;
        color: rgba(255,255,255,0.4);
        font-weight: 300;
      }
      .status-msg .spinner {
        width: 28px;
        height: 28px;
        border: 2px solid rgba(200,168,124,0.2);
        border-top-color: var(--bu-accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 14px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      .lightbox {
        position: fixed;
        inset: 0;
        z-index: 1000;
        background: rgba(0,0,0,0.92);
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
      }
      .lightbox.active { opacity: 1; pointer-events: all; }
      .lightbox img { max-width: 90vw; max-height: 85vh; border-radius: 8px; }
      .lightbox-close {
        position: absolute;
        top: 20px;
        right: 24px;
        background: rgba(255,255,255,0.1);
        border: none;
        color: #fff;
        width: 36px;
        height: 36px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .lightbox-dl {
        position: absolute;
        bottom: 30px;
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--bu-accent);
        color: #fff;
        font-size: 13px;
        font-weight: 600;
        padding: 10px 24px;
        border-radius: 8px;
        text-decoration: none;
      }
      .lightbox-dl svg { width: 14px; height: 14px; fill: currentColor; }

      @media (max-width: 600px) {
        .header { padding: 30px 16px 12px; }
        .file-grid {
          grid-template-columns: repeat(2, 1fr);
          gap: 10px;
          padding: 0 14px 40px;
        }
        .file-info { padding: 10px; }
        .file-name { font-size: 11px; }
      }
    </style>
  </head>
  <body>

      <div class="logo-mark">

      </div>
      <div class="tagline">recover from the world</div>
      <a class="back-link" id="back-link" href="../">
        <svg viewBox="0 0 24 24">
          <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
        </svg>
        <span id="back-label">Back to Brand Kit</span>
      </a>
    </div>

    <div class="divider"></div>

    <div class="folder-heading">
      <h1 id="folder-title">Loading&hellip;</h1>
    </div>

    <div id="content"></div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
      <button class="lightbox-close" id="lb-close">&times;</button>
      <img id="lightbox-img" src="" alt="" />
      <a class="lightbox-dl" id="lightbox-dl" href="#" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24"><path d="M12 16l-5-5h3V4h4v7h3l-5 5zm-7 4h14v-2H5v2z"/></svg>
        Download
      </a>
    </div>

    <script src="../config.js"></script>
    <script>
      (function () {
        // ── URL params ────────────────────────────────────────────────────────────────
        var params    = new URLSearchParams(window.location.search);
        var folderId  = params.get('folderId') || '';
        var folderName = params.get('name') || 'Brand Kit';
        var parentId   = params.get('parentId');
        var parentName = params.get('parentName') || 'Brand Kit';

        document.getElementById('folder-title').textContent = folderName;
        document.title = 'BainUltra \u2014 ' + folderName;

        // Update back link
        if (parentId) {
          var bl = document.getElementById('back-link');
          bl.href = '?folderId=' + encodeURIComponent(parentId)
            + '&name=' + encodeURIComponent(parentName);
          document.getElementById('back-label').textContent = 'Back to ' + parentName;
        }

        // ── Lightbox ──────────────────────────────────────────────────────────────────
        var lightbox = document.getElementById('lightbox');
        document.getElementById('lb-close').addEventListener('click', closeLightbox);
        lightbox.addEventListener('click', function (e) { if (e.target === lightbox) closeLightbox(); });
        document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeLightbox(); });

        function openLightbox(imgUrl, dlUrl, name) {
          document.getElementById('lightbox-img').src = imgUrl;
          var dl = document.getElementById('lightbox-dl');
          dl.href = dlUrl;
          lightbox.classList.add('active');
        }
        function closeLightbox() {
          lightbox.classList.remove('active');
          document.getElementById('lightbox-img').src = '';
        }

        // ── Drive helpers ─────────────────────────────────────────────────────────────
        var IMAGE_MIME = /^image\//;
        var VIDEO_MIME = /^video\//;
        var PDF_MIME   = 'application/pdf';
        var FOLDER_MIME = 'application/vnd.google-apps.folder';

        function hasKey() {
          return typeof GOOGLE_API_KEY === 'string'
            && GOOGLE_API_KEY.length > 10
            && GOOGLE_API_KEY !== 'YOUR_GOOGLE_API_KEY_HERE';
        }

        function driveList(q, fields, pageSize) {
          return fetch(
            'https://www.googleapis.com/drive/v3/files'
            + '?q=' + encodeURIComponent(q)
            + '&fields=' + encodeURIComponent(fields || 'files(id,name,mimeType)')
            + '&orderBy=' + encodeURIComponent('folder,name')
            + '&pageSize=' + (pageSize || 100)
            + '&key=' + GOOGLE_API_KEY
          ).then(function (r) { return r.json(); });
        }

        function thumbUrl(id) {
          return 'https://drive.google.com/thumbnail?id=' + id + '&sz=w400';
        }
        function viewUrl(id) {
          return 'https://drive.google.com/uc?export=view&id=' + id;
        }
        function dlUrl(id) {
          return 'https://drive.google.com/uc?export=download&id=' + id;
        }
        function previewUrl(id) {
          return 'https://drive.google.com/file/d/' + id + '/preview';
        }

        // Extension from filename
        function extOf(name) {
          var parts = (name || '').split('.');
          return parts.length > 1 ? parts[parts.length - 1].toLowerCase() : '';
        }

        // ── DOM helpers ───────────────────────────────────────────────────────────────
        var ICON_FOLDER = '<svg viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>';
        var ICON_ARROW  = '<svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg>';
        var ICON_DL     = '<svg viewBox="0 0 24 24"><path d="M12 16l-5-5h3V4h4v7h3l-5 5zm-7 4h14v-2H5v2z"/></svg>';

        function el(tag, cls) {
          var e = document.createElement(tag);
          if (cls) e.className = cls;
          return e;
        }

        // ── Load thumbnail for a folder ───────────────────────────────────────────────
        function loadFolderThumb(folId, imgEl) {
          // 1. direct images
          driveList("'" + folId + "' in parents and mimeType contains 'image/' and trashed = false", 'files(id)', 5)
            .then(function (d) {
              if (d.files && d.files.length) {
                imgEl.src = thumbUrl(d.files[0].id);
                imgEl.style.display = '';
                return;
              }
              // 2. first subfolder's images
              return driveList("'" + folId + "' in parents and mimeType = 'application/vnd.google-apps.folder' and trashed = false", 'files(id)', 3)
                .then(function (sub) {
                  if (!sub.files || !sub.files.length) return;
                  var i = 0;
                  function tryNext() {
                    if (i >= sub.files.length) return;
                    var sfId = sub.files[i++].id;
                    driveList("'" + sfId + "' in parents and mimeType contains 'image/' and trashed = false", 'files(id)', 3)
                      .then(function (d2) {
                        if (d2.files && d2.files.length) {
                          imgEl.src = thumbUrl(d2.files[0].id);
                          imgEl.style.display = '';
                        } else {
                          tryNext();
                        }
                      });
                  }
                  tryNext();
                });
            })
            .catch(function () {});
        }

        // ── Render grid ───────────────────────────────────────────────────────────────
        function renderFiles(items) {
          var container = document.getElementById('content');
          container.textContent = '';

          if (!items.length) {
            var msg = el('div', 'status-msg');
            msg.textContent = 'This folder is empty.';
            container.appendChild(msg);
            return;
          }

          var folders = items.filter(function (i) { return i.mimeType === FOLDER_MIME; });
          var files   = items.filter(function (i) { return i.mimeType !== FOLDER_MIME; });
          var grid    = el('div', 'file-grid');

          // ── Folders ────────────────────────────────────────────────────────────────
          folders.forEach(function (item) {
            var card = document.createElement('a');
            card.className = 'file-card';
            card.href = '?folderId=' + encodeURIComponent(item.id)
              + '&name=' + encodeURIComponent(item.name)
              + '&parentId=' + encodeURIComponent(folderId)
              + '&parentName=' + encodeURIComponent(folderName);

            // Thumb area
            var thumb = el('div', 'file-thumb');
            var img = document.createElement('img');
            img.alt = '';
            img.loading = 'lazy';
            img.style.display = 'none'; // hidden until loaded
            img.addEventListener('error', function () { this.style.display = 'none'; });
            thumb.appendChild(img);
            // Folder icon shown until image loads
            var iconBg = el('div', 'folder-icon-bg');
            iconBg.innerHTML = ICON_FOLDER;
            thumb.appendChild(iconBg);
            // Arrow badge
            var badge = el('div', 'folder-arrow-badge');
            badge.innerHTML = ICON_ARROW;
            thumb.appendChild(badge);
            card.appendChild(thumb);

            // Info row
            var info = el('div', 'file-info');
            var nameEl = el('div', 'file-name');
            nameEl.textContent = item.name;
            var action = el('span', 'file-action');
            action.innerHTML = ICON_ARROW;
            action.appendChild(document.createTextNode(' Open'));
            info.appendChild(nameEl);
            info.appendChild(action);
            card.appendChild(info);
            grid.appendChild(card);

            // Lazy-load thumbnail
            loadFolderThumb(item.id, img);
          });

          // ── Files ──────────────────────────────────────────────────────────────────
          files.forEach(function (item) {
            var mime = item.mimeType || '';
            var isImg = IMAGE_MIME.test(mime);
            var isVid = VIDEO_MIME.test(mime);
            var isPdf = mime === PDF_MIME;
            var ext = extOf(item.name);

            var card = document.createElement('a');
            card.className = 'file-card';

            if (isImg) {
              // Open in lightbox
              card.href = '#';
              (function (fileId, fileName) {
                card.addEventListener('click', function (e) {
                  e.preventDefault();
                  openLightbox(
                    thumbUrl(fileId),        // display (scaled)
                    dlUrl(fileId),           // download
                    fileName
                  );
                });
              })(item.id, item.name);

              var thumb = el('div', 'file-thumb');
              var img = document.createElement('img');
              img.src = thumbUrl(item.id);
              img.alt = item.name;
              img.loading = 'lazy';
              img.addEventListener('error', function () { this.style.display = 'none'; });
              thumb.appendChild(img);
              card.appendChild(thumb);

              var info = el('div', 'file-info');
              var nameEl = el('div', 'file-name');
              nameEl.textContent = item.name;
              var action = el('span', 'file-action');
              action.textContent = 'View';
              info.appendChild(nameEl);
              info.appendChild(action);
              card.appendChild(info);

            } else {
              // Link to file viewer
              card.href = '../file/?fileId=' + encodeURIComponent(item.id)
                + '&name=' + encodeURIComponent(item.name)
                + '&parentId=' + encodeURIComponent(folderId)
                + '&parentName=' + encodeURIComponent(folderName);

              var thumb = el('div', 'file-thumb');
              if (isPdf || isVid) {
                // Use Drive thumbnail for PDFs and videos
                var img = document.createElement('img');
                img.src = thumbUrl(item.id);
                img.alt = item.name;
                img.loading = 'lazy';
                img.addEventListener('error', function () { this.style.display = 'none'; });
                thumb.appendChild(img);
              }
              // Extension badge
              var extBadge = el('div', 'ext-badge');
              extBadge.textContent = ext || 'file';
              thumb.appendChild(extBadge);
              card.appendChild(thumb);

              var info = el('div', 'file-info');
              var nameEl = el('div', 'file-name');
              nameEl.textContent = item.name;
              var action = el('span', 'file-action');
              action.innerHTML = ICON_ARROW;
              action.appendChild(document.createTextNode(' Open'));
              info.appendChild(nameEl);
              info.appendChild(action);
              card.appendChild(info);
            }

            grid.appendChild(card);
          });

          container.appendChild(grid);
        }

        // ── Embedded Drive fallback (no API key needed) ───────────────────────────────
        function showDriveEmbed(id) {
          var container = document.getElementById('content');
          container.textContent = '';
          container.style.cssText = 'width:100%;flex:1;display:flex;flex-direction:column;';
          var iframe = document.createElement('iframe');
          iframe.src = 'https://drive.google.com/embeddedfolderview?id=' + id + '#grid';
          iframe.style.cssText = 'width:100%;flex:1;border:none;min-height:70vh;';
          iframe.allowFullscreen = true;
          container.appendChild(iframe);
        }

        // ── Load folder from Drive ────────────────────────────────────────────────────
        function loadFolder() {
          var container = document.getElementById('content');
          var spinner = el('div', 'status-msg');
          spinner.innerHTML = '<div class="spinner"></div>Loading files&hellip;';
          container.appendChild(spinner);

          if (!hasKey() || !folderId) {
            showDriveEmbed(folderId || '1d9qY3wMaK-eUJJFNlnnX84F9StrG0LQS');
            return;
          }

          driveList(
            "'" + folderId + "' in parents and trashed = false",
            'files(id,name,mimeType)',
            200
          )
            .then(function (data) {
              if (data.error) throw new Error(data.error.message || 'Drive API error');
              renderFiles(data.files || []);
            })
            .catch(function () {
              // API failed — fall back to embedded Drive folder viewer
              showDriveEmbed(folderId);
            });
        }

        loadFolder();
      })();
    </script>
  </body>
</html>
