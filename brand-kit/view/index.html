<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>BainUltra - Brand Kit</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root { --bu-accent: #c8a87c; --bu-accent-light: #d4bc98; }
* { margin: 0; padding: 0; box-sizing: border-box; }
html { height: 100%; font-family: 'Inter', -apple-system, sans-serif; background: #000; }
body {
  min-height: 100vh;
  background: #0a0a0a;
  color: #fff;
  display: flex; flex-direction: column; align-items: center;
  padding-bottom: env(safe-area-inset-bottom, 0);
}

.header {
  padding: 40px 24px 16px;
  text-align: center;
  display: flex; flex-direction: column; align-items: center;
  width: 100%;
}
.logo-mark { width: 200px; max-width: 55vw; margin-bottom: 10px; }
.logo-mark svg { width: 100%; height: auto; }
.tagline {
  font-size: 12px; font-weight: 300; color: rgba(255,255,255,0.4);
  letter-spacing: 0.15em; text-transform: uppercase;
}
.back-link {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.35);
  text-decoration: none; letter-spacing: 0.05em; margin-top: 14px;
  transition: color 0.2s;
}
.back-link:hover { color: rgba(255,255,255,0.65); }
.back-link svg { width: 14px; height: 14px; fill: currentColor; }

.divider {
  width: 60px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--bu-accent), transparent);
  margin: 20px auto 16px;
}

.folder-heading {
  text-align: center;
  padding: 0 20px 20px;
  width: 100%; max-width: 960px;
}
.folder-heading h1 {
  font-size: 20px; font-weight: 600; letter-spacing: -0.02em;
}

.embed-wrapper {
  width: 100%; max-width: 960px;
  padding: 0 20px 60px;
  flex: 1;
  display: flex; flex-direction: column;
}
.embed-box {
  background: #fff;
  border-radius: 12px;
  overflow: hidden;
  flex: 1;
  min-height: 520px;
}
#drive-frame {
  width: 100%; height: 100%;
  min-height: 520px;
  border: none; display: block;
}

@media (max-width: 500px) {
  .header { padding: 30px 16px 12px; }
  .folder-heading h1 { font-size: 18px; }
  .embed-wrapper { padding: 0 14px calc(40px + env(safe-area-inset-bottom, 0px)); }
  #drive-frame { min-height: 420px; }
}
</style>
</head>

<script>
  var p = new URLSearchParams(window.location.search);
  var id = p.get('id');
  var name = p.get('name') || 'Brand Kit Folder';
  document.getElementById('folder-title').textContent = name;
  document.title = 'BainUltra \u2014 ' + name;
  if (id) {
    document.getElementById('drive-frame').src =
      'https://drive.google.com/embeddedfolderview?id=' + id + '#list';
  }
