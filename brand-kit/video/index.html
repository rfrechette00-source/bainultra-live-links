<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>BainUltra - Showroom Video Loop</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root { --bu-accent: #c8a87c; --bu-accent-light: #d4bc98; }
* { margin: 0; padding: 0; box-sizing: border-box; }
html { height: 100%; font-family: 'Inter', -apple-system, sans-serif; background: #000; }
body {
  min-height: 100vh; background: #000; color: #fff;
  display: flex; flex-direction: column; align-items: center;
}
.header {
  padding: 24px 24px 12px; text-align: center; width: 100%;
  display: flex; flex-direction: column; align-items: center;
}
.back-link {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.35);
  text-decoration: none; letter-spacing: 0.05em; transition: color 0.2s;
}
.back-link:hover { color: rgba(255,255,255,0.65); }
.back-link svg { width: 14px; height: 14px; fill: currentColor; }

.video-title {
  font-size: 18px; font-weight: 600; margin: 12px 0 16px;
  letter-spacing: -0.02em;
}

.video-wrapper {
  width: 100%; max-width: 1200px; flex: 1;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 0 20px;
}
.video-container {
  width: 100%; aspect-ratio: 16/9; background: #111;
  border-radius: 12px; overflow: hidden;
  position: relative;
}
.video-container iframe {
  width: 100%; height: 100%; border: none; display: block;
}

.video-controls {
  display: flex; align-items: center; justify-content: center; gap: 12px;
  padding: 20px 0 40px; flex-wrap: wrap;
}
.dl-btn {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 13px; font-weight: 600; color: #fff;
  padding: 11px 28px; border-radius: 8px;
  background: var(--bu-accent); border: none;
  text-decoration: none; cursor: pointer; transition: all 0.2s;
}
.dl-btn:hover { background: var(--bu-accent-light); }
.dl-btn svg { width: 15px; height: 15px; fill: currentColor; }
.dl-btn.secondary {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
}
.dl-btn.secondary:hover {
  background: rgba(255,255,255,0.15);
}

.status-msg {
  text-align: center; padding: 80px 20px;
  font-size: 14px; color: rgba(255,255,255,0.4); font-weight: 300;
}
.spinner {
  width: 28px; height: 28px; border: 2px solid rgba(200,168,124,0.2);
  border-top-color: var(--bu-accent); border-radius: 50%;
  animation: spin 0.8s linear infinite; margin: 0 auto 14px;
}
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 600px) {
  .header { padding: 16px 16px 8px; }
  .video-title { font-size: 16px; margin: 8px 0 12px; }
  .video-wrapper { padding: 0 10px; }
  .video-controls { padding: 16px 0 32px; gap: 8px; }
  .dl-btn { padding: 10px 22px; font-size: 12px; }
}
</style>
</head>
<body>

<div class="header">
  <a class="back-link" href="../">
    <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    Back to Brand Kit
  </a>
  <div class="video-title">Showroom Video Loop</div>
</div>

<div class="video-wrapper" id="content">
  <div class="status-msg"><div class="spinner"></div>Loading video&hellip;</div>
</div>

<script>
var GOOGLE_API_KEY = 'AIzaSyCCsXbhDE7YnPH6uqLtpL0U8fOrZH-DFYk';
var folderId = '1-WI5xFEmro3TOYpWN8fbwY8CL1lPBU0v';

var apiUrl = 'https://www.googleapis.com/drive/v3/files'
  + '?q=' + encodeURIComponent("'" + folderId + "' in parents and trashed=false")
  + '&key=' + GOOGLE_API_KEY
  + '&fields=' + encodeURIComponent('files(id,name,mimeType)')
  + '&pageSize=10';

fetch(apiUrl)
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.error || !data.files) {
      document.getElementById('content').textContent = 'Unable to load video.';
      return;
    }
    var video = data.files.find(function(f) {
      return f.mimeType && f.mimeType.startsWith('video/');
    });
    if (!video) {
      document.getElementById('content').textContent = 'No video found in folder.';
      return;
    }

    var fileId = video.id;
    var embedUrl = 'https://drive.google.com/file/d/' + fileId + '/preview';
    var viewUrl = 'https://drive.google.com/file/d/' + fileId + '/view';
    var downloadUrl = 'https://drive.google.com/uc?export=download&id=' + fileId;

    var content = document.getElementById('content');

    // Build video container with iframe embed
    var container = document.createElement('div');
    container.className = 'video-container';
    var iframe = document.createElement('iframe');
    iframe.src = embedUrl;
    iframe.setAttribute('allow', 'autoplay; encrypted-media; fullscreen');
    iframe.setAttribute('allowfullscreen', 'true');
    iframe.setAttribute('loading', 'eager');
    container.appendChild(iframe);

    // Build controls
    var controls = document.createElement('div');
    controls.className = 'video-controls';

    var openBtn = document.createElement('a');
    openBtn.className = 'dl-btn';
    openBtn.href = viewUrl;
    openBtn.target = '_blank';
    openBtn.textContent = 'Open in Google Drive';

    var dlBtn = document.createElement('a');
    dlBtn.className = 'dl-btn secondary';
    dlBtn.href = downloadUrl;
    dlBtn.target = '_blank';
    dlBtn.textContent = 'Download Video';

    controls.appendChild(openBtn);
    controls.appendChild(dlBtn);

    content.textContent = '';
    content.appendChild(container);
    content.appendChild(controls);

    // If iframe fails to load after 8 seconds, show fallback
    var timer = setTimeout(function() {
      var fallback = document.createElement('p');
      fallback.style.cssText = 'text-align:center;font-size:12px;color:rgba(255,255,255,0.35);margin-top:8px';
      fallback.textContent = 'Video not loading? Click "Open in Google Drive" above.';
      content.appendChild(fallback);
    }, 8000);

    iframe.onload = function() { clearTimeout(timer); };
  })
  .catch(function(err) {
    document.getElementById('content').textContent = 'Unable to load video.';
  });
</script>

</body>
</html>
