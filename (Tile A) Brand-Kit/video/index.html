<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>BainUltra - Showroom Video Loop</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bu-accent: #c8a87c;
        --bu-accent-light: #d4bc98;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        height: 100%;
        font-family:
          "Inter",
          -apple-system,
          sans-serif;
        background: #000;
      }
      body {
        min-height: 100vh;
        background: #000;
        color: #fff;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .header {
        padding: 24px 24px 12px;
        text-align: center;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.35);
        text-decoration: none;
        letter-spacing: 0.05em;
        transition: color 0.2s;
      }
      .back-link:hover {
        color: rgba(255, 255, 255, 0.65);
      }
      .back-link svg {
        width: 14px;
        height: 14px;
        fill: currentColor;
      }
      .video-title {
        font-size: 18px;
        font-weight: 600;
        margin: 12px 0 16px;
        letter-spacing: -0.02em;
      }
      .video-wrapper {
        width: 100%;
        max-width: 1200px;
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 0 20px;
      }
      .video-container {
        width: 100%;
        aspect-ratio: 16/9;
        background: #111;
        border-radius: 12px;
        overflow: hidden;
      }
      .video-container video {
        width: 100%;
        height: 100%;
        display: block;
      }
      .video-controls {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 20px 0 40px;
        flex-wrap: wrap;
      }
      .dl-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        font-weight: 600;
        color: #fff;
        padding: 11px 28px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
        text-decoration: none;
        transition: all 0.2s;
      }
      .dl-btn:hover {
        background: rgba(255, 255, 255, 0.15);
      }
      .dl-btn svg {
        width: 15px;
        height: 15px;
        fill: currentColor;
      }

      @media (max-width: 600px) {
        .header {
          padding: 16px 16px 8px;
        }
        .video-title {
          font-size: 16px;
          margin: 8px 0 12px;
        }
        .video-wrapper {
          padding: 0 10px;
        }
        .video-controls {
          padding: 16px 0 32px;
          gap: 8px;
        }
        .dl-btn {
          padding: 10px 22px;
          font-size: 12px;
        }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <a class="back-link" href="../">
        <svg viewBox="0 0 24 24">
          <path
            d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"
          />
        </svg>
        Back to Brand Kit
      </a>
      <div class="video-title">Showroom Video Loop</div>
    </div>

    <div class="video-wrapper">
      <div class="video-container">
        <video
          src="../files/BAINULTRA-ONLINE-HUB/Brand Kit/Showroom Video Loop/Showroom Video Loop.mp4"
          autoplay
          loop
          muted
          playsinline
          controls
        ></video>
      </div>
      <div class="video-controls">
        <a
          class="dl-btn"
          href="../files/BAINULTRA-ONLINE-HUB/Brand Kit/Showroom Video Loop/Showroom Video Loop.mp4"
          download="Showroom Video Loop.mp4"
        >
          <svg viewBox="0 0 24 24">
            <path d="M12 16l-5-5h3V4h4v7h3l-5 5zm-7 4h14v-2H5v2z" />
          </svg>
          Download Video
        </a>
      </div>
    </div>
  </body>
</html>
