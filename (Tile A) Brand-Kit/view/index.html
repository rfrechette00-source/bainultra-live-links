<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>BainUltra - Brand Kit</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bu-accent: #c8a87c;
        --bu-accent-light: #d4bc98;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        height: 100%;
        font-family:
          "Inter",
          -apple-system,
          sans-serif;
        background: #000;
      }
      body {
        min-height: 100vh;
        background: #0a0a0a;
        color: #fff;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-bottom: env(safe-area-inset-bottom, 0);
      }
      .header {
        padding: 40px 24px 16px;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
      }
      .logo-mark {
        width: 180px;
        max-width: 50vw;
        margin-bottom: 8px;
      }
      .logo-mark svg {
        width: 100%;
        height: auto;
      }
      .tagline {
        font-size: 11px;
        font-weight: 300;
        color: rgba(255, 255, 255, 0.35);
        letter-spacing: 0.15em;
        text-transform: uppercase;
      }
      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.35);
        text-decoration: none;
        letter-spacing: 0.05em;
        margin-top: 14px;
        transition: color 0.2s;
      }
      .back-link:hover {
        color: rgba(255, 255, 255, 0.65);
      }
      .back-link svg {
        width: 14px;
        height: 14px;
        fill: currentColor;
      }
      .divider {
        width: 60px;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--bu-accent),
          transparent
        );
        margin: 20px auto 16px;
      }

      .folder-heading {
        text-align: center;
        padding: 0 20px 24px;
        width: 100%;
        max-width: 1100px;
      }
      .folder-heading h1 {
        font-size: 20px;
        font-weight: 600;
        letter-spacing: -0.02em;
      }

      .file-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 16px;
        width: 100%;
        max-width: 1200px;
        padding: 0 20px 60px;
      }
      .file-card {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        overflow: hidden;
        transition: all 0.2s;
        cursor: pointer;
        text-decoration: none;
        color: #fff;
        display: flex;
        flex-direction: column;
      }
      .file-card:hover {
        background: rgba(255, 255, 255, 0.07);
        border-color: rgba(200, 168, 124, 0.25);
        transform: translateY(-2px);
      }
      .file-thumb {
        width: 100%;
        aspect-ratio: 4/3;
        background: rgba(255, 255, 255, 0.03);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
      }
      .file-thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .file-thumb .thumb-bg {
        position: absolute;
        inset: 0;
        background-size: cover;
        background-position: center;
        opacity: 0.18;
        transition: opacity 0.3s;
        pointer-events: none;
      }
      .file-card:hover .thumb-bg {
        opacity: 0.3;
      }
      .folder-arrow-badge {
        position: absolute;
        bottom: 10px;
        right: 10px;
        width: 26px;
        height: 26px;
        background: rgba(200, 168, 124, 0.15);
        border: 1px solid rgba(200, 168, 124, 0.3);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--bu-accent);
        z-index: 1;
      }
      .folder-arrow-badge svg {
        width: 13px;
        height: 13px;
        fill: currentColor;
      }
      .ext-badge {
        position: absolute;
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: rgba(255, 255, 255, 0.55);
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 3px 8px;
        border-radius: 4px;
      }
      .file-info {
        padding: 10px 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .file-name {
        flex: 1;
        font-size: 12px;
        font-weight: 500;
        line-height: 1.3;
        word-break: break-word;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .file-action {
        flex-shrink: 0;
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 11px;
        font-weight: 500;
        color: var(--bu-accent);
        padding: 4px 10px;
        border-radius: 5px;
        background: rgba(200, 168, 124, 0.1);
        border: 1px solid rgba(200, 168, 124, 0.15);
      }
      .file-action svg {
        width: 11px;
        height: 11px;
        fill: currentColor;
      }

      .status-msg {
        text-align: center;
        padding: 80px 20px;
        font-size: 14px;
        color: rgba(255, 255, 255, 0.4);
        font-weight: 300;
      }
      .status-msg .spinner {
        width: 28px;
        height: 28px;
        border: 2px solid rgba(200, 168, 124, 0.2);
        border-top-color: var(--bu-accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 14px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .lightbox {
        position: fixed;
        inset: 0;
        z-index: 1000;
        background: rgba(0, 0, 0, 0.92);
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
      }
      .lightbox.active {
        opacity: 1;
        pointer-events: all;
      }
      .lightbox img {
        max-width: 90vw;
        max-height: 85vh;
        border-radius: 8px;
      }
      .lightbox-close {
        position: absolute;
        top: 20px;
        right: 24px;
        background: rgba(255, 255, 255, 0.1);
        border: none;
        color: #fff;
        width: 36px;
        height: 36px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .lightbox-dl {
        position: absolute;
        bottom: 30px;
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--bu-accent);
        color: #fff;
        font-size: 13px;
        font-weight: 600;
        padding: 10px 24px;
        border-radius: 8px;
        text-decoration: none;
      }
      .lightbox-dl svg {
        width: 14px;
        height: 14px;
        fill: currentColor;
      }

      @media (max-width: 600px) {
        .header {
          padding: 30px 16px 12px;
        }
        .file-grid {
          grid-template-columns: repeat(2, 1fr);
          gap: 10px;
          padding: 0 14px 40px;
        }
        .file-info {
          padding: 10px;
        }
        .file-name {
          font-size: 11px;
        }
      }
    </style>
  </head>

      <div class="tagline">recover from the world</div>
      <a class="back-link" id="back-link" href="../">
        <svg viewBox="0 0 24 24">
          <path
            d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"
          />

    <div class="divider"></div>

    <div class="folder-heading">
      <h1 id="folder-title">Loading&hellip;</h1>
    </div>

    <div id="content"></div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
      <button class="lightbox-close" id="lb-close">&times;</button>
      <img id="lightbox-img" src="" alt="" />
      <a class="lightbox-dl" id="lightbox-dl" href="#">
        <svg viewBox="0 0 24 24">
          <path d="M12 16l-5-5h3V4h4v7h3l-5 5zm-7 4h14v-2H5v2z" />
        </svg>
        Download
      </a>
    </div>

    <script>
      var FILE_BASE = "../files/BAINULTRA-ONLINE-HUB/Brand Kit/";

      var params = new URLSearchParams(window.location.search);
      var folderPath = params.get("path") || "";
      var folderName =
        params.get("name") || folderPath.split("/").pop() || "Brand Kit";
      var parentPath = params.get("parent");
      var parentName = params.get("parentName") || "Brand Kit";

      document.getElementById("folder-title").textContent = folderName;
      document.title = "BainUltra \u2014 " + folderName;

      if (parentPath !== null) {
        var bl = document.getElementById("back-link");
        bl.href =
          "?path=" +
          encodeURIComponent(parentPath) +
          "&name=" +
          encodeURIComponent(parentName);
        document.getElementById("back-label").textContent =
          "Back to " + parentName;
      }

      // ── Lightbox ──────────────────────────────────────────────────────────────────
      var lightbox = document.getElementById("lightbox");
      document
        .getElementById("lb-close")
        .addEventListener("click", closeLightbox);
      lightbox.addEventListener("click", function (e) {
        if (e.target === lightbox) closeLightbox();
      });
      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape") closeLightbox();
      });

      function openLightbox(src, name) {
        document.getElementById("lightbox-img").src = src;
        var dl = document.getElementById("lightbox-dl");
        dl.href = src;
        dl.setAttribute("download", name);
        lightbox.classList.add("active");
      }
      function closeLightbox() {
        lightbox.classList.remove("active");
        document.getElementById("lightbox-img").src = "";
      }

      // ── File type helpers ─────────────────────────────────────────────────────────
      var IMAGE_EXTS = { jpg: 1, jpeg: 1, png: 1, gif: 1, webp: 1 };
      function isImage(ext) {
        return !!IMAGE_EXTS[ext];
      }

      // ── SVG icon templates (static, no user data) ─────────────────────────────────
      var ICON_FOLDER =
        '<svg viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>';
      var ICON_PDF =
        '<svg viewBox="0 0 24 24"><path d="M20 2H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8.5 7.5c0 .83-.67 1.5-1.5 1.5H9v2H7.5V7H10c.83 0 1.5.67 1.5 1.5v1zm5 2c0 .83-.67 1.5-1.5 1.5h-2.5V7H15c.83 0 1.5.67 1.5 1.5v3zm4-3H19v1h1.5V11H19v2h-1.5V7h3v1.5zM9 9.5h1v-1H9v1zM4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm10 5.5h1v-3h-1v3z"/></svg>';
      var ICON_FILE =
        '<svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>';
      var ICON_ARROW =
        '<svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg>';
      var ICON_DL =
        '<svg viewBox="0 0 24 24"><path d="M12 16l-5-5h3V4h4v7h3l-5 5zm-7 4h14v-2H5v2z"/></svg>';

      // ── DOM builder helpers (safe — no user data via innerHTML) ───────────────────
      function el(tag, cls) {
        var e = document.createElement(tag);
        if (cls) e.className = cls;
        return e;
      }
      function iconEl(svgStr) {
        var wrap = el("div", "icon-large");
        wrap.innerHTML = svgStr; // static SVG only
        return wrap;
      }

      function findFirstImage(node) {
        // Skip product renders: files with _1K., _Top., _Front., _Side., _ISO., or topview in name
        function isRender(name) {
          return /(_1k\.|_top\.|_front\.|_side\.|_iso\.|topview)/i.test(
            name || "",
          );
        }
        // Two-pass: prefer jpg/jpeg (real photos) over png (often cutouts)
        function search(n, jpgOnly) {
          if (!n.children) return null;
          for (var i = 0; i < n.children.length; i++) {
            var c = n.children[i];
            if (c.type === "file" && !isRender(c.name)) {
              var ext = c.ext || "";
              if (
                jpgOnly
                  ? /^(jpg|jpeg)$/.test(ext)
                  : /^(jpg|jpeg|png|gif|webp)$/.test(ext)
              ) {
                return FILE_BASE + c.path;
              }
            }
            if (c.type === "folder") {
              var found = search(c, jpgOnly);
              if (found) return found;
            }
          }
          return null;
        }
        return search(node, true) || search(node, false);
      }

      function makeThumbFolder(previewUrl) {
        var thumb = el("div", "file-thumb");
        if (previewUrl) {
          var img = document.createElement("img");
          img.src = previewUrl;
          img.alt = "";
          img.loading = "lazy";
          thumb.appendChild(img);
        }
        var badge = el("div", "folder-arrow-badge");
        badge.innerHTML = ICON_ARROW; // static SVG only
        thumb.appendChild(badge);
        return thumb;
      }
      function makeThumbImage(src, name) {
        var thumb = el("div", "file-thumb");
        var img = document.createElement("img");
        img.src = src;
        img.alt = name;
        img.loading = "lazy";
        thumb.appendChild(img);
        return thumb;
      }
      function makeThumbIcon(extLabel) {
        var thumb = el("div", "file-thumb");
        if (extLabel) {
          var badge = el("div", "ext-badge");
          badge.textContent = extLabel;
          thumb.appendChild(badge);
        }
        return thumb;
      }
      function makeFileInfo(name, actionLabel, actionIcon) {
        var info = el("div", "file-info");
        var nameEl = el("div", "file-name");
        nameEl.textContent = name;
        var action = el("span", "file-action");
        action.innerHTML = actionIcon; // static SVG only
        action.appendChild(document.createTextNode(" " + actionLabel));
        info.appendChild(nameEl);
        info.appendChild(action);
        return info;
      }

      // ── Manifest tree navigation ──────────────────────────────────────────────────
      function getNodeAtPath(tree, path) {
        if (!path) return tree;
        var parts = path.split("/");
        var node = tree;
        for (var i = 0; i < parts.length; i++) {
          if (!node.children) return null;
          var found = null;
          for (var j = 0; j < node.children.length; j++) {
            if (node.children[j].name === parts[i]) {
              found = node.children[j];
              break;
            }
          }
          if (!found) return null;
          node = found;
        }
        return node;
      }

      // ── Render grid ───────────────────────────────────────────────────────────────
      function renderFiles(node) {
        var container = document.getElementById("content");
        var items = node.children || [];
        if (!items.length) {
          var msg = el("div", "status-msg");
          msg.textContent = "This folder is empty.";
          container.appendChild(msg);
          return;
        }

        var folders = items.filter(function (i) {
          return i.type === "folder";
        });
        var files = items.filter(function (i) {
          return i.type === "file";
        });
        var grid = el("div", "file-grid");

        folders.forEach(function (item) {
          var card = document.createElement("a");
          card.className = "file-card";
          card.href =
            "?path=" +
            encodeURIComponent(item.path) +
            "&name=" +
            encodeURIComponent(item.name) +
            "&parent=" +
            encodeURIComponent(folderPath) +
            "&parentName=" +
            encodeURIComponent(folderName);
          card.appendChild(makeThumbFolder(findFirstImage(item)));
          card.appendChild(makeFileInfo(item.name, "Open", ICON_ARROW));
          grid.appendChild(card);
        });

        files.forEach(function (item) {
          var ext = (item.ext || "").toLowerCase();
          var fileUrl = FILE_BASE + item.path;
          var card = document.createElement("a");
          card.className = "file-card";

          if (isImage(ext)) {
            card.href = "#";
            card.addEventListener(
              "click",
              (function (url, name) {
                return function (e) {
                  e.preventDefault();
                  openLightbox(url, name);
                };
              })(fileUrl, item.name),
            );
            card.appendChild(makeThumbImage(fileUrl, item.name));
            card.appendChild(makeFileInfo(item.name, "View", ""));
          } else {
            card.href =
              "../file/?path=" +
              encodeURIComponent(item.path) +
              "&name=" +
              encodeURIComponent(item.name) +
              "&parent=" +
              encodeURIComponent(folderPath) +
              "&parentName=" +
              encodeURIComponent(folderName);
            card.appendChild(makeThumbIcon(ext || "file"));
            card.appendChild(makeFileInfo(item.name, "Open", ICON_ARROW));
          }
          grid.appendChild(card);
        });

        container.textContent = "";
        container.appendChild(grid);
      }

      // ── Load manifest ─────────────────────────────────────────────────────────────
      function showFolder(tree) {
        var node = getNodeAtPath(tree, folderPath);
        var container = document.getElementById("content");
        container.textContent = "";
        if (!node) {
          var msg = el("div", "status-msg");
          msg.textContent = "Folder not found: " + folderPath;
          container.appendChild(msg);
          return;
        }
        document.getElementById("folder-title").textContent = folderName;
        renderFiles(node);
      }

      function loadFolder() {
        var container = document.getElementById("content");
        var spinner = el("div", "status-msg");
        spinner.innerHTML = '<div class="spinner"></div>Loading files&hellip;'; // static HTML
        container.appendChild(spinner);

        if (window._manifest) {
          showFolder(window._manifest);
          return;
        }

        fetch("../files/manifest.json")
          .then(function (r) {
            if (!r.ok) throw new Error("HTTP " + r.status);
            return r.json();
          })
          .then(function (data) {
            window._manifest = data;
            showFolder(data);
          })
          .catch(function (err) {
            container.textContent = "";
            var msg = el("div", "status-msg");
            var line1 = document.createElement("div");
            line1.textContent = "Could not load file index.";
            var line2 = document.createElement("div");
            line2.textContent = err.message;
            line2.style.cssText = "font-size:12px;opacity:0.5;margin-top:8px";
            msg.appendChild(line1);
            msg.appendChild(line2);
            container.appendChild(msg);
          });
      }

      loadFolder();
    </script>
  </body>
</html>
